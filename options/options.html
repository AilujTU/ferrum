<!DOCTYPE html>
<html>

<head>
    <title>ferrum Settings</title>
    <link rel="stylesheet" href="options.css">
</head>

<body>
    <div class="schedule-group">
        <h2>Focus Hours</h2>
        <label>
            Keep sites blocked on weekends:
            <input type="checkbox" id="weekendsEnabled" />
            <span class="toggle-switch"></span>
        </label>
        <label>
            Start:
            <input type="time" id="startTime" />
        </label>
        <label>
            End:
            <input type="time" id="endTime" />
        </label>
        <button id="saveScheduleBtn">Save Schedule</button>
    </div>
    <div class="row">
        <div class="column">
            <div class="container">
                <h1>Blocked Websites</h1>

                <div class="input-group">
                    <input id="siteInput" type="text" placeholder="e.g. reddit.com" />
                    <button id="addBtn">Add</button>
                </div>

                <ul id="currentSiteList"></ul>
            </div>
        </div>
        <div class="column">
            <div class="container">
                <h1>Previous Selection</h1>
                <button id="clearPrevBtn">Clear previously selected</button>
                <ul id="prevSiteList"></ul>
            </div>
        </div>
    </div>


    <script src="options.js"></script>
</body>

</html>
